# Default LLM profile (v1.0): per-agent models on NVIDIA cloud.
# Optional: assign any agent to local_* profiles if local NIM is running.
# Same cloud base_url for all cloud profiles; each agent uses its own model_name.
#
# Env:
#   NVIDIA_API_KEY=nvapi-...
#   NIM_CLOUD_BASE_URL=https://integrate.api.nvidia.com/v1
#   NIM_LOCAL_BASE_URL=http://127.0.0.1:8000/v1
#   LLM_PROFILE=multimodel
#
# Model IDs must be enabled on your NVIDIA API account.

profiles:
  # --- Cloud (integrate.api.nvidia.com) — one endpoint, many models ---
  cloud_llama_8b:
    provider: nim
    base_url: ${NIM_CLOUD_BASE_URL}
    model: meta/llama-3.1-8b-instruct
    temperature: 0.2
    max_tokens: 2048
    tags: { llm_provider: cloud, model_family: llama }

  cloud_llama_70b:
    provider: nim
    base_url: ${NIM_CLOUD_BASE_URL}
    model: meta/llama-3.1-70b-instruct
    temperature: 0.2
    max_tokens: 4096
    tags: { llm_provider: cloud, model_family: llama }

  cloud_mistral_7b:
    provider: nim
    base_url: ${NIM_CLOUD_BASE_URL}
    model: mistralai/mistral-7b-instruct-v0.3
    temperature: 0.15
    max_tokens: 2048
    tags: { llm_provider: cloud, model_family: mistral }

  cloud_nemotron_mini:
    provider: nim
    base_url: ${NIM_CLOUD_BASE_URL}
    model: nvidia/nemotron-mini-4b-instruct
    temperature: 0.1
    max_tokens: 1024
    tags: { llm_provider: cloud, model_family: nemotron }

  cloud_phi_mini:
    provider: nim
    base_url: ${NIM_CLOUD_BASE_URL}
    model: microsoft/phi-3-mini-128k-instruct
    temperature: 0.2
    max_tokens: 2048
    tags: { llm_provider: cloud, model_family: phi }

  # --- Local NIM on GPU instance (optional second endpoint) ---
  local_llama_8b:
    provider: nim
    base_url: ${NIM_LOCAL_BASE_URL}
    model: meta/llama-3.1-8b-instruct
    temperature: 0.2
    max_tokens: 2048
    tags: { llm_provider: local, model_family: llama }

assignments:
  classifier: cloud_nemotron_mini
  smart_router_llm: cloud_nemotron_mini
  aggregator: cloud_llama_70b
  incident_critic: cloud_llama_8b
  workflow_selector_default: cloud_nemotron_mini

  agents:
    flood: cloud_llama_8b
    cyber: cloud_mistral_7b
    infrastructure: cloud_llama_8b
    public_services: cloud_phi_mini
    public_safety: cloud_llama_8b
    comms: cloud_phi_mini
    general: cloud_llama_8b
    utilities: cloud_llama_8b

embeddings:
  provider: nim
  base_url: ${NIM_CLOUD_BASE_URL}
  model: nvidia/nv-embedqa-e5-v5
