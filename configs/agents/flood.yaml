# Flood specialist — role, LLM, workflow selection, and workflows
# See docs/TECHNICAL_DESIGN.md §4.5 and §6

agent_id: flood
role: flood_coordinator
display_name: Flood Response Specialist

# LLM: use global profile from configs/llm/multimodel.yaml (assignments.agents.flood)
# Or override:
# llm:
#   profile: cloud_llama_8b
#   # profile: cloud_mistral_7b
#   # model: meta/llama-3.1-70b-instruct   # inline override (same cloud base_url)

workflow_selection:
  mode: hybrid
  default: flood_standard
  rules_file: flood_selector_rules.yaml

workflows:
  flood_light:
    description: Low-severity localized flooding
    actions:
      - id: kb
        type: tool
        skill: playbook_rag
        params: { tags: [flood, minor] }
      - id: analyze
        type: llm
        skill: draft_recommendation
        output_schema: FloodAnalysisOutput

  flood_standard:
    description: Standard flood assessment
    actions:
      - id: kb
        type: tool
        skill: playbook_rag
        params: { tags: [flood, evacuation] }
      - id: weather
        type: tool
        skill: weather_api
      - id: zone
        type: tool
        skill: flood_zone_gis
        depends_on: [kb]
      - id: analyze
        type: llm
        skill: draft_recommendation
        input_from: [kb, weather, zone]
        output_schema: FloodAnalysisOutput
      - id: verify
        type: critic
        rules: [require_citations, no_uncited_population]

  flood_critical:
    inherits: flood_standard
    actions:
      - id: evac
        type: tool
        skill: evacuation_routes
      - id: escalate_hint
        type: rule
        when: severity == CRITICAL
        emit: { recommend_escalation: national_emergency_services }

  flood_dam_breach:
    inherits: flood_critical
    description: Dam or levee breach — highest priority playbook
